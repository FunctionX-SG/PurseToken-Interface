# .cicd/values.yaml  (for pursetoken staging)
replicaCount: 1

image:
  repository: lancelai/pursetoken-interface   # CI will overwrite repo/tag if you like
  tag: dev                                   # CI sets stg-<sha7>
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: regcred

containerPort: 3000

env:
  - name: NODE_ENV
    value: production

resources:
  requests:
    cpu: "50m"
    memory: 128Mi
  limits:
    cpu: "500m"
    memory: 512Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  annotations: {}   # ← REMOVE all Traefik keys
  hosts:
    - host: staging.pursetoken.com
      paths:
        - path: /
          pathType: Prefix
  tls: []           # add cert-manager later if needed 

# optional: extra labels you wanted
podLabels:
  stack: common
  tier: frontend
